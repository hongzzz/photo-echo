name: Bug Report
description: 报告一个 Bug
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰描述遇到的问题
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 如何复现这个问题？
      placeholder: |
        1. ...
        2. ...
        3. ...

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么？

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 运行环境
      placeholder: |
        - OS: macOS / Linux / Windows
        - Node.js version:
        - Ollama version:
        - Immich version:
        - PhotoEcho version:
