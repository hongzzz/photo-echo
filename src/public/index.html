<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhotoEcho</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'PingFang SC', -apple-system, BlinkMacSystemFont, 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #0a0a0a;
      min-height: 100vh;
      color: #e8e0d8;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .brand {
      text-align: center;
      margin-bottom: 48px;
    }

    .brand h1 {
      font-size: 20px;
      font-weight: 300;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: rgba(232, 224, 216, 0.6);
    }

    .brand .divider {
      width: 40px;
      height: 1px;
      background: rgba(232, 224, 216, 0.2);
      margin: 16px auto;
    }

    .brand .subtitle {
      font-size: 13px;
      color: rgba(232, 224, 216, 0.35);
      letter-spacing: 2px;
    }

    /* Main memorial display */
    .memorial {
      max-width: 640px;
      width: 100%;
      position: relative;
    }

    .memorial-frame {
      position: relative;
      border-radius: 4px;
      overflow: hidden;
      background: #1a1816;
      box-shadow:
        0 2px 8px rgba(0,0,0,0.4),
        0 16px 48px rgba(0,0,0,0.3);
    }

    .memorial-frame img {
      width: 100%;
      display: block;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .memorial-frame img.loaded {
      opacity: 1;
    }

    .memorial-info {
      padding: 24px 28px;
      background: #1a1816;
      border-top: 1px solid rgba(232, 224, 216, 0.06);
    }

    .memorial-caption {
      font-size: 15px;
      line-height: 1.9;
      color: rgba(232, 224, 216, 0.75);
      font-family: 'Songti SC', 'STSong', serif;
      letter-spacing: 1px;
      white-space: pre-wrap;
    }

    .memorial-meta {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .memorial-date {
      font-size: 12px;
      color: rgba(232, 224, 216, 0.3);
      letter-spacing: 2px;
    }

    .memorial-score {
      font-size: 11px;
      color: rgba(232, 224, 216, 0.2);
      letter-spacing: 1px;
    }

    /* Status bar */
    .status-bar {
      max-width: 640px;
      width: 100%;
      margin-bottom: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 4px;
    }

    .status-date {
      font-size: 13px;
      color: rgba(232, 224, 216, 0.4);
      letter-spacing: 1px;
    }

    .status-badge {
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 100px;
      letter-spacing: 1px;
    }

    .status-badge.success {
      background: rgba(120, 180, 120, 0.15);
      color: rgba(160, 210, 160, 0.8);
    }

    .status-badge.pending {
      background: rgba(210, 180, 120, 0.12);
      color: rgba(210, 190, 140, 0.7);
    }

    .status-badge.error {
      background: rgba(200, 120, 120, 0.12);
      color: rgba(210, 150, 150, 0.7);
    }

    /* Actions */
    .actions {
      max-width: 640px;
      width: 100%;
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 36px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 24px;
      background: transparent;
      color: rgba(232, 224, 216, 0.5);
      text-decoration: none;
      border-radius: 4px;
      font-size: 13px;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      border: 1px solid rgba(232, 224, 216, 0.1);
      cursor: pointer;
      font-family: inherit;
    }

    .btn:hover {
      color: rgba(232, 224, 216, 0.8);
      border-color: rgba(232, 224, 216, 0.25);
      background: rgba(232, 224, 216, 0.04);
    }

    .btn:active {
      background: rgba(232, 224, 216, 0.08);
    }

    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .btn.primary {
      background: rgba(232, 224, 216, 0.08);
      border-color: rgba(232, 224, 216, 0.15);
      color: rgba(232, 224, 216, 0.7);
    }

    .btn.primary:hover {
      background: rgba(232, 224, 216, 0.12);
      border-color: rgba(232, 224, 216, 0.3);
    }

    /* Loading state */
    .loading-state {
      text-align: center;
      padding: 80px 20px;
    }

    .loader {
      width: 24px;
      height: 24px;
      border: 1.5px solid rgba(232, 224, 216, 0.1);
      border-top-color: rgba(232, 224, 216, 0.4);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 13px;
      color: rgba(232, 224, 216, 0.3);
      letter-spacing: 1px;
    }

    .loading-hint {
      font-size: 12px;
      color: rgba(232, 224, 216, 0.2);
      margin-top: 8px;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }

    .empty-state p {
      font-size: 14px;
      color: rgba(232, 224, 216, 0.3);
      line-height: 1.8;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .page { padding: 24px 16px; }
      .brand h1 { font-size: 16px; letter-spacing: 6px; }
      .brand { margin-bottom: 32px; }
      .memorial-info { padding: 20px; }
      .memorial-caption { font-size: 14px; }
      .actions { gap: 8px; }
      .btn { padding: 10px 16px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="brand">
      <h1>PhotoEcho</h1>
      <div class="divider"></div>
      <p class="subtitle">历史照片的回响</p>
    </div>

    <div class="status-bar">
      <span class="status-date" id="date"></span>
      <span class="status-badge" id="status"></span>
    </div>

    <div id="content" class="memorial">
      <div class="loading-state">
        <div class="loader"></div>
        <p class="loading-text">加载中</p>
      </div>
    </div>

    <div class="actions">
      <button class="btn" onclick="loadToday()" id="refreshBtn">刷新</button>
      <button class="btn primary" onclick="regenerate()" id="regenerateBtn">重新生成</button>
      <a class="btn" href="/history.html">历史回忆</a>
    </div>
  </div>

  <script>
    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')}`;
    }

    async function loadToday() {
      const content = document.getElementById('content');
      const status = document.getElementById('status');
      const date = document.getElementById('date');
      const refreshBtn = document.getElementById('refreshBtn');
      const regenerateBtn = document.getElementById('regenerateBtn');

      refreshBtn.disabled = true;
      regenerateBtn.disabled = true;

      content.innerHTML = `
        <div class="loading-state">
          <div class="loader"></div>
          <p class="loading-text">加载中</p>
        </div>
      `;

      try {
        const response = await fetch('/api/memories/today');
        const data = await response.json();

        const today = new Date().toISOString().split('T')[0];
        date.textContent = formatDate(today);

        if (data.success && data.image) {
          status.textContent = '已生成';
          status.className = 'status-badge success';

          content.innerHTML = `
            <div class="memorial-frame">
              <img src="${data.image}" alt="今日纪念" onload="this.classList.add('loaded')" />
            </div>
          `;
        } else {
          status.textContent = '待生成';
          status.className = 'status-badge pending';
          content.innerHTML = `
            <div class="empty-state">
              <p>今日纪念尚未生成<br>点击「重新生成」开始</p>
            </div>
          `;
        }
      } catch (error) {
        status.textContent = '异常';
        status.className = 'status-badge error';
        content.innerHTML = `
          <div class="empty-state">
            <p>加载失败，请稍后重试</p>
          </div>
        `;
      } finally {
        refreshBtn.disabled = false;
        regenerateBtn.disabled = false;
      }
    }

    async function regenerate() {
      const content = document.getElementById('content');
      const regenerateBtn = document.getElementById('regenerateBtn');
      const status = document.getElementById('status');

      regenerateBtn.disabled = true;
      status.textContent = '生成中';
      status.className = 'status-badge pending';

      content.innerHTML = `
        <div class="loading-state">
          <div class="loader"></div>
          <p class="loading-text">AI 正在创作</p>
          <p class="loading-hint">这可能需要几分钟</p>
        </div>
      `;

      try {
        const response = await fetch('/api/memories/regenerate', { method: 'POST' });
        const data = await response.json();

        if (data.success) {
          await loadToday();
        } else {
          status.textContent = '失败';
          status.className = 'status-badge error';
          content.innerHTML = `
            <div class="empty-state">
              <p>${data.message || '生成失败'}</p>
            </div>
          `;
        }
      } catch (error) {
        status.textContent = '异常';
        status.className = 'status-badge error';
        content.innerHTML = `
          <div class="empty-state">
            <p>生成失败，请稍后重试</p>
          </div>
        `;
      } finally {
        regenerateBtn.disabled = false;
      }
    }

    loadToday();
  </script>
</body>
</html>
