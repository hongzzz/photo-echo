<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhotoEcho - 历史回忆</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'PingFang SC', -apple-system, BlinkMacSystemFont, 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #0a0a0a;
      min-height: 100vh;
      color: #e8e0d8;
    }

    .header {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 300;
      letter-spacing: 6px;
      color: rgba(232, 224, 216, 0.5);
    }

    .header a {
      color: rgba(232, 224, 216, 0.4);
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 1px;
      padding: 8px 16px;
      border: 1px solid rgba(232, 224, 216, 0.1);
      border-radius: 4px;
      transition: all 0.3s ease;
    }

    .header a:hover {
      color: rgba(232, 224, 216, 0.7);
      border-color: rgba(232, 224, 216, 0.2);
    }

    /* Masonry-style grid */
    .grid {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .card {
      background: #141210;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.4s ease;
      border: 1px solid rgba(232, 224, 216, 0.04);
    }

    .card:hover {
      border-color: rgba(232, 224, 216, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .card:hover img {
      opacity: 1;
    }

    .card img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
      opacity: 0.88;
      transition: opacity 0.4s ease;
    }

    .card-body {
      padding: 16px 18px 18px;
    }

    .card-date {
      font-size: 12px;
      color: rgba(232, 224, 216, 0.3);
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .card-caption {
      font-size: 13px;
      color: rgba(232, 224, 216, 0.55);
      line-height: 1.7;
      font-family: 'Songti SC', 'STSong', serif;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: rgba(232, 224, 216, 0.2);
      letter-spacing: 1px;
    }

    /* Pagination */
    .pagination {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
    }

    .pagination button {
      padding: 8px 20px;
      background: transparent;
      color: rgba(232, 224, 216, 0.4);
      border: 1px solid rgba(232, 224, 216, 0.1);
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }

    .pagination button:hover:not(:disabled) {
      color: rgba(232, 224, 216, 0.7);
      border-color: rgba(232, 224, 216, 0.2);
    }

    .pagination button:disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }

    .pagination span {
      color: rgba(232, 224, 216, 0.25);
      font-size: 12px;
      letter-spacing: 2px;
    }

    /* Empty & Loading */
    .empty {
      text-align: center;
      color: rgba(232, 224, 216, 0.3);
      padding: 100px 20px;
      font-size: 14px;
      letter-spacing: 1px;
    }

    .loading {
      text-align: center;
      padding: 100px 20px;
    }

    .loader {
      width: 24px;
      height: 24px;
      border: 1.5px solid rgba(232, 224, 216, 0.1);
      border-top-color: rgba(232, 224, 216, 0.4);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    .loading p {
      color: rgba(232, 224, 216, 0.3);
      font-size: 13px;
      letter-spacing: 1px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox-content {
      max-width: 800px;
      width: 100%;
      position: relative;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.97); }
      to { opacity: 1; transform: scale(1); }
    }

    .lightbox-content img {
      width: 100%;
      border-radius: 4px;
      display: block;
    }

    .lightbox-caption {
      color: rgba(232, 224, 216, 0.65);
      text-align: center;
      margin-top: 20px;
      font-size: 15px;
      line-height: 1.9;
      font-family: 'Songti SC', 'STSong', serif;
      white-space: pre-wrap;
      letter-spacing: 1px;
    }

    .lightbox-date {
      color: rgba(232, 224, 216, 0.25);
      text-align: center;
      margin-top: 10px;
      font-size: 12px;
      letter-spacing: 2px;
    }

    .lightbox-close {
      position: absolute;
      top: -44px;
      right: 0;
      color: rgba(232, 224, 216, 0.4);
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      padding: 4px 12px;
      transition: color 0.3s;
    }

    .lightbox-close:hover {
      color: rgba(232, 224, 216, 0.8);
    }

    /* Responsive */
    @media (max-width: 480px) {
      .header { padding: 24px 16px 20px; }
      .header h1 { font-size: 14px; letter-spacing: 4px; }
      .grid { padding: 0 16px; gap: 16px; grid-template-columns: 1fr; }
      .pagination { margin: 32px auto; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>历史回忆</h1>
    <a href="/">返回首页</a>
  </div>

  <div class="grid" id="grid">
    <div class="loading" style="grid-column: 1 / -1;">
      <div class="loader"></div>
      <p>加载中</p>
    </div>
  </div>

  <div class="pagination" id="pagination" style="display: none;">
    <button id="prevBtn" onclick="loadPage(currentPage - 1)">上一页</button>
    <span id="pageInfo"></span>
    <button id="nextBtn" onclick="loadPage(currentPage + 1)">下一页</button>
  </div>

  <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <div class="lightbox-content">
      <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
      <img id="lightbox-img" src="" alt="" />
      <div class="lightbox-caption" id="lightbox-caption"></div>
      <div class="lightbox-date" id="lightbox-date"></div>
    </div>
  </div>

  <script>
    const PAGE_SIZE = 12;
    let currentPage = 1;
    let totalItems = 0;

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const parts = dateStr.split('-');
      return `${parts[0]}.${parts[1]}.${parts[2]}`;
    }

    function formatDateCN(dateStr) {
      if (!dateStr) return '';
      const parts = dateStr.split('-');
      return `${parts[0]}年${parseInt(parts[1])}月${parseInt(parts[2])}日`;
    }

    function openLightbox(id, caption, date) {
      const lightbox = document.getElementById('lightbox');
      const img = document.getElementById('lightbox-img');
      const cap = document.getElementById('lightbox-caption');
      const dt = document.getElementById('lightbox-date');
      img.src = `/api/memories/${encodeURIComponent(id)}/image`;
      cap.textContent = caption || '';
      dt.textContent = formatDateCN(date);
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function escapeAttr(str) {
      return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function closeLightbox(event) {
      if (event && event.target !== event.currentTarget) return;
      document.getElementById('lightbox').classList.remove('active');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeLightbox();
    });

    // Event delegation for card clicks
    document.getElementById('grid').addEventListener('click', (e) => {
      const card = e.target.closest('.card');
      if (!card) return;
      openLightbox(card.dataset.id, card.dataset.caption, card.dataset.date);
    });

    async function loadPage(page) {
      const grid = document.getElementById('grid');
      const pagination = document.getElementById('pagination');

      grid.innerHTML = `
        <div class="loading" style="grid-column: 1 / -1;">
          <div class="loader"></div>
          <p>加载中</p>
        </div>
      `;

      try {
        const offset = (page - 1) * PAGE_SIZE;
        const res = await fetch(`/api/memories/history?limit=${PAGE_SIZE}&offset=${offset}`);
        const data = await res.json();

        totalItems = data.total;
        currentPage = page;
        const totalPages = Math.ceil(totalItems / PAGE_SIZE);

        if (data.items.length === 0) {
          grid.innerHTML = '<div class="empty" style="grid-column: 1 / -1;">暂无历史回忆</div>';
          pagination.style.display = 'none';
          return;
        }

        grid.innerHTML = data.items.map(item => `
          <div class="card" data-id="${escapeAttr(item.id)}" data-caption="${escapeAttr(item.caption || '')}" data-date="${escapeAttr(item.date)}">
            <img src="/api/memories/${encodeURIComponent(item.id)}/image" alt="${escapeAttr(formatDate(item.date))}" loading="lazy" />
            <div class="card-body">
              <div class="card-date">${escapeHtml(formatDate(item.date))}</div>
              <div class="card-caption">${escapeHtml(item.caption || '')}</div>
              <div class="card-meta">
                <span>${escapeHtml(item.style || '')}</span>
                <span>${item.score != null ? escapeHtml(item.score.toFixed(1) + ' 分') : ''}</span>
              </div>
            </div>
          </div>
        `).join('');

        pagination.style.display = 'flex';
        document.getElementById('prevBtn').disabled = page <= 1;
        document.getElementById('nextBtn').disabled = page >= totalPages;
        document.getElementById('pageInfo').textContent = `${page} / ${totalPages}`;

        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (error) {
        grid.innerHTML = '<div class="empty" style="grid-column: 1 / -1;">加载失败，请稍后重试</div>';
      }
    }

    loadPage(1);
  </script>
</body>
</html>
